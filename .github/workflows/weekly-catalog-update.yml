name: Weekly Catalog Update

# 매주 월요일 00:00 UTC(= 09:00 KST) 자동 실행 + 수동 실행
on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      auto_merge:
        description: 'PR 없이 main에 직접 커밋(완전 무인)'
        type: boolean
        default: false

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: weekly-catalog-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # validate.py의 git show HEAD 비교용

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install anthropic

      # 1) 후보 수집 (LLM 없음, 항상 실행)
      - name: Collect candidates
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAX_CANDIDATES: '30'
        run: python3 scripts/collect.py

      # 2) API 키 확인 — 없으면 판정 불가이므로 명확히 실패시킨다.
      - name: Check API key
        env:
          APIKEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$APIKEY" ]; then
            echo "::error::ANTHROPIC_API_KEY 시크릿이 없습니다. SETUP.md의 시크릿 등록을 참고하세요."
            exit 1
          fi
          echo "API 키 확인됨."

      # 3) Claude API로 판정 (CLAUDE.md 지침대로 큐레이션)
      - name: Judge with Claude API
        id: judge_api
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scripts/judge_api.py

      # 4) 안전장치 — 실패 시 여기서 중단(커밋 안 됨)
      - name: Validate
        run: python3 scripts/validate.py

      # 5) 변경 유무 확인
      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet -- agents.csv; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "agents.csv 변경 없음."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git --no-pager diff --stat -- agents.csv
          fi

      # 6) 커밋 → PR 생성(기본) 또는 main 직접 커밋(완전 무인)
      - name: Commit & open PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AUTO_MERGE: ${{ github.event.inputs.auto_merge }}
        run: |
          set -euo pipefail
          DATE=$(date -u +%Y%m%d)
          git config user.name  "nais-catalog-bot"
          git config user.email "actions@github.com"

          if [ "${AUTO_MERGE:-false}" = "true" ]; then
            git add agents.csv weekly_report.md candidates.json || git add agents.csv
            git commit -m "chore(auto): 주간 카탈로그 갱신 ${DATE}"
            git push origin HEAD:main
            echo "완전 무인 모드: main에 직접 커밋했습니다."
          else
            BRANCH="auto/update-${DATE}"
            git checkout -b "$BRANCH"
            git add agents.csv weekly_report.md candidates.json || git add agents.csv
            git commit -m "chore(auto): 주간 카탈로그 갱신 ${DATE}"
            git push -f origin "$BRANCH"
            BODY="자동 수집·판정 결과입니다. \`weekly_report.md\`와 \`agents.csv\` diff를 검토 후 머지하세요.

            - 판정 경로: Claude API (${{ steps.judge_api.outcome }})
            - validate.py 통과 완료(행 삭제/컬럼 변경 없음 확인)"
            # 조직 정책상 Actions의 PR 자동생성이 막혀 있을 수 있다.
            # 성공하면 PR을, 실패하면 사람이 열 수 있도록 비교 링크를 출력한다(잡은 실패시키지 않음).
            REPO="${GITHUB_REPOSITORY:-nais-kr/ai-agent-catalog}"
            COMPARE="https://github.com/${REPO}/compare/main...${BRANCH}?expand=1"
            if gh pr create --base main --head "$BRANCH" \
                 --title "주간 카탈로그 갱신 ${DATE}" --body "$BODY" 2>/tmp/pr_err; then
              echo "PR을 생성했습니다: $BRANCH"
            elif gh pr edit "$BRANCH" --body "$BODY" 2>/dev/null; then
              echo "기존 PR을 갱신했습니다: $BRANCH"
            else
              echo "::warning::PR 자동생성 실패(조직 정책 가능). 아래 링크로 수동 생성하세요."
              cat /tmp/pr_err || true
              echo "🔗 PR 만들기: ${COMPARE}"
              echo "### 🔗 [여기서 PR 만들기](${COMPARE})" >> "$GITHUB_STEP_SUMMARY"
              echo "브랜치 \`${BRANCH}\` 가 푸시되었습니다. 위 링크로 PR을 열어 검토·머지하세요." >> "$GITHUB_STEP_SUMMARY"
            fi
          fi
