name: Weekly Catalog Update

# 매주 월요일 00:00 UTC(= 09:00 KST) 자동 실행 + 수동 실행
on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      auto_merge:
        description: 'PR 없이 main에 직접 커밋(완전 무인)'
        type: boolean
        default: false

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: weekly-catalog-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # validate.py의 git show HEAD 비교용

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps (fallback용)
        run: pip install anthropic

      # 1) 후보 수집 (LLM 없음, 항상 실행)
      - name: Collect candidates
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAX_CANDIDATES: '30'
        run: python3 scripts/collect.py

      # 2) 판정 경로 결정: 구독(OAuth) 우선, 없으면 API 폴백
      - name: Detect judge mode
        id: detect
        env:
          OAUTH: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          APIKEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$OAUTH" ]; then
            echo "mode=oauth" >> "$GITHUB_OUTPUT"
          elif [ -n "$APIKEY" ]; then
            echo "mode=api" >> "$GITHUB_OUTPUT"
          else
            echo "mode=none" >> "$GITHUB_OUTPUT"
          fi
          echo "판정 경로: $(tail -n1 "$GITHUB_OUTPUT")"

      # 3a) 구독 경로 — Claude Code Action이 CLAUDE.md 지침대로 큐레이션
      - name: Judge with Claude subscription
        if: steps.detect.outputs.mode == 'oauth'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            이 저장소의 CLAUDE.md 지침을 정확히 따라 주간 카탈로그 큐레이션을 수행하라.
            1. candidates.json을 읽는다(없거나 비면 아무 것도 추가하지 말고 종료).
            2. 각 후보가 agents.csv에 이미 있으면 건너뛴다(이름·URL 정규화 비교).
            3. 과학·연구 에이전트로서 가치 있는 신규 후보만 CLAUDE.md 규칙대로
               25컬럼 1행으로 만들어 agents.csv 끝에 append한다.
               - id는 최대 AG번호+1, status=active, last_verified=오늘.
               - score는 CLAUDE.md §4 룩업표대로 계산.
               - CSV는 UTF-8 with BOM 유지, 컬럼 순서 절대 변경 금지, 기존 행 삭제 금지.
            4. weekly_report.md에 이번 주 추가/제외 내역을 한국어로 요약한다.
            5. 끝나면 `python3 scripts/validate.py`를 실행해 통과하는지 확인하고,
               실패하면 원인을 고쳐 다시 통과시켜라.
            커밋·푸시·PR 생성은 하지 마라(이후 워크플로우 단계가 처리한다).

      # 3b) API 폴백 경로 — Haiku로 후보→행 변환
      - name: Judge with Claude API (fallback)
        if: steps.detect.outputs.mode == 'api'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scripts/judge_api.py

      - name: No judge path configured
        if: steps.detect.outputs.mode == 'none'
        run: |
          echo "::warning::CLAUDE_CODE_OAUTH_TOKEN / ANTHROPIC_API_KEY 시크릿이 없어 판정을 건너뜁니다."
          echo "candidates.json만 수집되었습니다. SETUP.md의 시크릿 등록을 참고하세요."

      # 4) 안전장치 — 실패 시 여기서 중단(커밋 안 됨)
      - name: Validate
        run: python3 scripts/validate.py

      # 5) 변경 유무 확인
      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet -- agents.csv; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "agents.csv 변경 없음."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git --no-pager diff --stat -- agents.csv
          fi

      # 6) 커밋 → PR 생성(기본) 또는 main 직접 커밋(완전 무인)
      - name: Commit & open PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AUTO_MERGE: ${{ github.event.inputs.auto_merge }}
        run: |
          set -euo pipefail
          DATE=$(date -u +%Y%m%d)
          git config user.name  "nais-catalog-bot"
          git config user.email "actions@github.com"

          if [ "${AUTO_MERGE:-false}" = "true" ]; then
            git add agents.csv weekly_report.md candidates.json || git add agents.csv
            git commit -m "chore(auto): 주간 카탈로그 갱신 ${DATE}"
            git push origin HEAD:main
            echo "완전 무인 모드: main에 직접 커밋했습니다."
          else
            BRANCH="auto/update-${DATE}"
            git checkout -b "$BRANCH"
            git add agents.csv weekly_report.md candidates.json || git add agents.csv
            git commit -m "chore(auto): 주간 카탈로그 갱신 ${DATE}"
            git push -f origin "$BRANCH"
            BODY="자동 수집·판정 결과입니다. \`weekly_report.md\`와 \`agents.csv\` diff를 검토 후 머지하세요.

            - 판정 경로: ${{ steps.detect.outputs.mode }}
            - validate.py 통과 완료(행 삭제/컬럼 변경 없음 확인)"
            gh pr create --base main --head "$BRANCH" \
              --title "주간 카탈로그 갱신 ${DATE}" \
              --body "$BODY" || \
            gh pr edit "$BRANCH" --body "$BODY"
            echo "PR을 생성했습니다: $BRANCH"
          fi
